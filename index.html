<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>血壓紀錄系統</title>
    <link rel="icon" type="image/x-icon" href="/images/favicon.ico">
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&family=Noto+Sans+TC:wght@400;500;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🩸</text></svg>">

    <style>
        :root {
            --danger-color: #f85149;
            --bg-color: #0d1117;
            --card-bg: #161b22;
            --text-color: #c9d1d9;
            --text-secondary: #8b949e;
            --border-color: #30363d;

            --radius-main: 16px;
            --radius-sub: 12px;
            --transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        .latest-record {
            outline: 2px solid var(--danger-color);
            outline-offset: -2px;
            position: relative;
            z-index: 1;
            /* 輕微跳動動畫，讓它更醒目 */
            animation: pulse-border 2s infinite;
        }

        @keyframes pulse-border {
            0% {
                outline-color: rgba(248, 81, 73, 1);
            }

            50% {
                outline-color: rgba(248, 81, 73, 0.4);
            }

            100% {
                outline-color: rgba(248, 81, 73, 1);
            }
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Noto Sans TC', 'Poppins', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            padding: 24px;
            gap: 24px;
            height: 100vh;
            overflow: hidden;
        }

        .main-container {
            display: flex;
            width: 100%;
            height: 100%;
            gap: 24px;
        }

        .data-section {
            flex: 1 1 70%;
            display: flex;
            flex-direction: column;
            gap: 20px;
            height: 100%;
            min-width: 0;
        }

        .table-card {
            background-color: var(--card-bg);
            border-radius: var(--radius-main);
            padding: 24px;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.4);
            flex: 1;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            border: 1px solid var(--border-color);
        }

        .table-card h2 {
            font-weight: 700;
            margin-bottom: 16px;
            /* 改用綠色漸層標題 */
            background: linear-gradient(135deg, #3fb950, #2ea043);
            -webkit-background-clip: text;
            background-clip: text; /* 加入標準屬性 */
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .table-card h2 i {
            -webkit-text-fill-color: #3fb950;
        }

        .table-wrapper {
            flex: 1;
            overflow-y: auto;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sub);
            background-color: var(--bg-color);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: center;
            font-size: 0.95rem;
        }

        thead {
            position: sticky;
            top: 0;
            background-color: #0d1117;
            z-index: 10;
        }

        th,
        td {
            border-bottom: 1px solid var(--border-color);
            padding: 14px 10px;
            vertical-align: middle; /* 垂直居中 */
        }

        th {
            font-weight: 600;
            color: var(--text-secondary);
            font-size: 0.8rem;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        /* 數值欄位的標題與內容統一靠右對齊 */
        .col-sys, .col-dia, .col-hr, .col-fulltime,
        td.sys-val, td.dia-val, td.hr-val, td.fulltime-val {
            text-align: right !important;
            padding-right: 24px !important;
        }

        /* 日期與狀態欄位統一居中 */
        .col-date, .col-period, .col-status,
        td.date-val, td.period-val, td.status-val {
            text-align: center !important;
        }

        tbody tr:last-child td {
            border-bottom: none;
        }

        .record-row {
            transition: var(--transition);
        }

        .record-row:hover {
            filter: brightness(1.2);
            background-color: rgba(255, 255, 255, 0.02);
        }

        .day-color-0 {
            background-color: transparent;
        }

        .day-color-1 {
            background-color: #1c2128;
        }

        .text-high {
            color: var(--danger-color);
            font-weight: 700;
            text-shadow: 0 0 8px rgba(248, 81, 73, 0.3);
            /* 增加發光質感 */
        }

        .input-section {
            flex: 1 1 30%;
            display: flex;
            flex-direction: column;
            gap: 20px;
            height: 100%;
        }

        .input-card {
            background-color: var(--card-bg);
            border-radius: var(--radius-main);
            padding: 24px;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.4);
            display: flex;
            flex-direction: column;
            gap: 16px;
            border: 1px solid var(--border-color);
        }

        .input-card h2 {
            font-weight: 700;
            margin-bottom: 8px;
            color: var(--text-color);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .form-field {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-label {
            font-size: 0.85rem;
            color: var(--text-secondary);
            font-weight: 600;
        }

        .form-input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .form-input {
            width: 100%;
            padding: 14px 18px;
            padding-right: 70px; /* 增加右側內距，為單位留出空間 */
            font-size: 1.1rem;
            background-color: var(--bg-color);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sub);
            transition: var(--transition);
            font-family: 'Poppins', sans-serif;
            font-weight: 500;
            color: var(--text-color);
        }

        /* 隱藏 Chrome, Safari, Edge, Opera 的數值箭頭 */
        .form-input::-webkit-outer-spin-button,
        .form-input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            appearance: none; /* 加入標準屬性 */
            margin: 0;
        }

        /* 隱藏 Firefox 的數值箭頭 */
        .form-input[type=number] {
            -moz-appearance: textfield;
        }

        .form-input:focus {
            outline: none;
            border-color: #3fb950;
            box-shadow: 0 0 0 2px rgba(63, 185, 80, 0.3);
        }

        .form-input::placeholder {
            color: #484f58;
        }

        .input-unit {
            position: absolute;
            right: 18px;
            font-size: 0.9rem;
            color: var(--text-secondary);
            pointer-events: none;
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .action-row {
            display: flex;
            gap: 14px;
            width: 100%;
        }

        /* 漸層與陰影按鈕 (不再限定於 button 標籤) */
        .btn {
            width: 100%;
            padding: 16px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            border: none;
            border-radius: var(--radius-sub);
            color: #ffffff;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.2);
            box-sizing: border-box; /* 確保 padding 不會撐大 label */
            user-select: none;     /* 避免 label 上的文字被選取 */
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.4);
            filter: brightness(1.1);
        }

        .btn:active {
            transform: translateY(1px);
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.3);
            filter: brightness(0.9);
        }

        .btn-submit {
            background: linear-gradient(135deg, #2ea043 0%, #3fb950 100%);
        }

        .btn-delete {
            background: linear-gradient(135deg, #da3633 0%, #f85149 100%);
        }

        .btn-export {
            background: linear-gradient(135deg, #1f6feb 0%, #58a6ff 100%);
            flex: 1;
        }

        .btn-import {
            background: linear-gradient(135deg, #8957e5 0%, #b392f0 100%);
            flex: 1;
        }

        .table-wrapper::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        .table-wrapper::-webkit-scrollbar-track {
            background: var(--bg-color);
            border-radius: 10px;
        }

        .table-wrapper::-webkit-scrollbar-thumb {
            background: #30363d;
            border-radius: 10px;
        }

        .table-wrapper::-webkit-scrollbar-thumb:hover {
            background: #484f58;
        }

        /* 手機瀏覽模式 */
        @media (max-width: 900px) {
            body {
                padding: 12px;
                height: auto;
                min-height: 100vh;
                overflow-y: auto;
            }

            .main-container {
                flex-direction: column;
            }

            .data-section,
            .input-section {
                flex: none;
                width: 100%;
                height: auto;
            }

            .input-section {
                order: 1; /* 改為 1，讓 data-section (order 預設 0) 在手機模式下排在最上方 */
            }

            .input-card {
                padding: 16px;
            }

            .table-card {
                padding: 16px;
            }

            .table-wrapper {
                max-height: 400px;
                /* 增加一點高度 */
            }

            th,
            td {
                padding: 12px 6px;
                font-size: 0.9rem;
            }

            td.sys-val,
            td.dia-val,
            td.hr-val {
                padding-right: 8px;
            }

            .hide-on-mobile {
                display: none;
            }

            .btn-group {
                gap: 12px;
            }

            button.btn {
                padding: 14px;
                font-size: 0.95rem;
            }
        }
    </style>
</head>

<body>

    <div class="main-container">
        <div class="data-section">
            <div class="table-card">
                <h2><i class="fas fa-heartbeat"></i> 血壓歷史紀錄</h2>
                <div class="table-wrapper">
                    <table id="dataTable">
                        <thead>
                            <tr>
                                <th class="hide-on-mobile col-date">年</th>
                                <th class="col-date">月</th>
                                <th class="col-date">日</th>
                                <th class="col-sys">高 (SYS)</th>
                                <th class="col-dia">低 (DIA)</th>
                                <th class="col-hr">心跳 (HR)</th>
                                <th class="hide-on-mobile col-period">時間段</th>
                                <th class="hide-on-mobile col-status">狀態</th>
                                <th class="hide-on-mobile col-fulltime">完整紀錄時間</th>
                            </tr>
                        </thead>
                        <tbody id="recordBody">
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <div class="input-section">
            <div class="input-card">
                <h2><i class="fas fa-notes-medical"></i> 新增量測</h2>
                <div class="form-field">
                    <label class="form-label">收縮壓 (高)</label>
                    <div class="form-input-wrapper">
                        <input type="number" id="sysInput" class="form-input" placeholder="119" autofocus>
                        <span class="input-unit">mmHg</span>
                    </div>
                </div>
                <div class="form-field">
                    <label class="form-label">舒張壓 (低)</label>
                    <div class="form-input-wrapper">
                        <input type="number" id="diaInput" class="form-input" placeholder="81">
                        <span class="input-unit">mmHg</span>
                    </div>
                </div>
                <div class="form-field">
                    <label class="form-label">心跳</label>
                    <div class="form-input-wrapper">
                        <input type="number" id="hrInput" class="form-input" placeholder="62">
                        <span class="input-unit">bpm</span>
                    </div>
                </div>
                <div class="form-field"> <!-- 移除 hide-on-mobile，讓手機也能輸入備註 -->
                    <label class="form-label">備註狀態</label>
                    <div class="form-input-wrapper" style="flex-direction: column; gap: 8px; align-items: stretch;">
                        <select id="statusSelect" class="form-input" onchange="toggleCustomStatus()">
                            <option value="無">無</option>
                            <option value="藥前">藥前</option>
                            <option value="藥後">藥後</option>
                            <option value="自訂">自訂</option>
                        </select>
                        <input type="text" id="statusCustomInput" class="form-input" placeholder="請輸入自訂狀態" style="display: none;">
                    </div>
                </div>
            </div>

            <div class="input-card">
                <div class="btn-group">
                    <button class="btn btn-submit" onclick="addRecord()">
                        <i class="fas fa-check-circle"></i> 輸入並紀錄
                    </button>
                    <button class="btn btn-delete" onclick="deleteLatestRecord()">
                        <i class="fas fa-eraser"></i> 刪除最新紀錄
                    </button>
                    <div class="action-row">
                        <button class="btn btn-export" onclick="exportToCSV()">
                            <i class="fas fa-file-download"></i> 匯出 TXT
                        </button>
                        <input type="file" id="csvFileInput" accept=".txt"
                            style="position: absolute; width: 0; height: 0; opacity: 0; pointer-events: none;"
                            onchange="importFromCSV(event)">
                        <label for="csvFileInput" class="btn btn-import" style="margin: 0; flex: 1;">
                            <i class="fas fa-file-upload"></i> 匯入 TXT
                        </label>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const HIGH_SYS_THRESHOLD = 140;
        const HIGH_DIA_THRESHOLD = 90;
        const STORAGE_KEY = 'bp_records_data';

        let recordsData = [];

        function getTimePeriod(hour) {
            if (hour >= 5 && hour < 12) return '早上';
            if (hour >= 12 && hour < 18) return '下午';
            return '晚上';
        }

        function loadFromStorage() {
            const dataStr = localStorage.getItem(STORAGE_KEY);
            if (dataStr) {
                recordsData = JSON.parse(dataStr);
            }
            renderTable();
        }

        function saveToStorage() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(recordsData));
        }

        function renderTable() {
            recordsData.sort((a, b) => new Date(b.fullTime) - new Date(a.fullTime));

            const tbody = document.getElementById('recordBody');
            tbody.innerHTML = '';

            let currentDateStr = null;
            let colorToggle = 0;

            recordsData.forEach((r, index) => {
                const dateStr = `${r.year}-${r.month}-${r.day}`;

                if (currentDateStr !== dateStr) {
                    if (currentDateStr !== null) {
                        colorToggle = colorToggle === 0 ? 1 : 0;
                    }
                    currentDateStr = dateStr;
                }

                const sys = parseInt(r.sys);
                const dia = parseInt(r.dia);

                const highClassSys = sys >= HIGH_SYS_THRESHOLD ? ' text-high' : '';
                const highClassDia = dia >= HIGH_DIA_THRESHOLD ? ' text-high' : '';

                const tr = document.createElement('tr');
                tr.className = `record-row day-color-${colorToggle}`;
                if (index === 0) {
                    tr.classList.add('latest-record');
                }
                tr.innerHTML = `
                    <td class="hide-on-mobile date-val">${r.year}</td>
                    <td class="date-val">${r.month}</td>
                    <td class="date-val">${r.day}</td>
                    <td class="sys-val${highClassSys}">${r.sys}</td>
                    <td class="dia-val${highClassDia}">${r.dia}</td>
                    <td class="hr-val">${r.hr}</td>
                    <td class="hide-on-mobile period-val">${r.period}</td>
                    <td class="status-val hide-on-mobile">${r.status}</td>
                    <td class="hide-on-mobile fulltime-val">${r.fullTime}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        function addRecord() {
            const sys = document.getElementById('sysInput').value;
            const dia = document.getElementById('diaInput').value;
            const hr = document.getElementById('hrInput').value;
            
            const statusSelect = document.getElementById('statusSelect');
            const statusCustomInput = document.getElementById('statusCustomInput');
            let status = statusSelect.value;
            if (status === '自訂') {
                status = statusCustomInput.value || '無';
            }

            if (!sys || !dia || !hr) {
                alert('請完整輸入高血壓、低血壓與心跳數值。');
                return;
            }

            const now = new Date();
            const year = now.getFullYear();
            const month = now.getMonth() + 1; // 移除補零
            const day = now.getDate(); // 移除補零
            const hour = String(now.getHours()).padStart(2, '0');
            const minute = String(now.getMinutes()).padStart(2, '0');

            const period = getTimePeriod(now.getHours());
            const fullTimeStr = `${year}/${month}/${day} ${hour}:${minute}`;

            recordsData.push({
                year: year.toString(),
                month: month.toString(),
                day: day.toString(),
                sys: sys.toString(),
                dia: dia.toString(),
                hr: hr.toString(),
                period: period,
                status: status,
                fullTime: fullTimeStr
            });

            document.getElementById('sysInput').value = '';
            document.getElementById('diaInput').value = '';
            document.getElementById('hrInput').value = '';
            
            // 重設備註選單
            document.getElementById('statusSelect').value = '無';
            const statusCustomInputReset = document.getElementById('statusCustomInput');
            statusCustomInputReset.value = '';
            statusCustomInputReset.style.display = 'none';
            
            if (window.innerWidth > 900) {
                document.getElementById('sysInput').focus();
            }

            saveToStorage();
            renderTable();
        }

        function toggleCustomStatus() {
            const select = document.getElementById('statusSelect');
            const customInput = document.getElementById('statusCustomInput');
            if (select.value === '自訂') {
                customInput.style.display = 'block';
                customInput.focus();
            } else {
                customInput.style.display = 'none';
            }
        }

        function deleteLatestRecord() {
            if (recordsData.length > 0) {
                recordsData.shift();
                saveToStorage();
                renderTable();
            } else {
                alert('已經沒有紀錄可刪除了。');
            }
        }

        function exportToCSV() {
            if (recordsData.length === 0) {
                alert('沒有資料可以匯出。');
                return;
            }

            let csvContent = '\uFEFF';
            csvContent += '"年","月","日","高 (SYS)","低 (DIA)","心跳 (HR)","時間段","狀態","完整紀錄時間"\r\n';

            recordsData.forEach(r => {
                const rowData = [r.year, r.month, r.day, r.sys, r.dia, r.hr, r.period, r.status, r.fullTime].map(v => `"${v}"`);
                csvContent += rowData.join(',') + '\r\n';
            });

            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');

            const unixtime = Date.now();
            
            link.setAttribute('href', url);
            link.setAttribute('download', `血壓_${unixtime}.txt`);
            link.style.display = 'none';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        function importFromCSV(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function (e) {
                const text = e.target.result;
                const lines = text.replace(/^\uFEFF/, '').trim().split(/\r?\n/);

                if (lines.length <= 1) {
                    alert('檔案空白或格式無效。');
                    return;
                }

                for (let i = 1; i < lines.length; i++) {
                    const rowText = lines[i];
                    if (!rowText) continue;

                    const cols = rowText.split(',').map(c => c.replace(/^"|"$/g, '').trim());
                    if (cols.length < 9) continue;

                    recordsData.push({
                        year: cols[0],
                        month: cols[1],
                        day: cols[2],
                        sys: cols[3],
                        dia: cols[4],
                        hr: cols[5],
                        period: cols[6],
                        status: cols[7],
                        fullTime: cols[8]
                    });
                }

                saveToStorage();
                renderTable();
                event.target.value = '';
            };
            reader.readAsText(file, "UTF-8");
        }

        window.onload = function () {
            loadFromStorage();
        };
    </script>
</body>

</html>
